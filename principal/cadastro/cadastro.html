<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="cadastro.css">
    <title>TechSensei</title>
     <link rel="shortcut icon" href="../assets/Logo.png" type="image/x-icon">
</head>

<body>
    <div class="background">
        <video autoplay muted loop>
            <source src="../../assets/túnel Roxo.mp4">
        </video>
    </div>

    <div class="centro">
        <form action="" id="cadastroForm">


            <h1>Cadastro</h1>
            <div class="input-container">
                 <label for="username">Nome de usuário:</label>
                <input type="text" id="username" name="username" required>
            </div>

            <div class="input-container">
                 <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>
            </div>

            <div class="input-container">
                <label for="data">Data de nascimento:</label>
                <input type="date" id="data" name="data" required>
            </div>

            <div class="input-container">
                <label for="password">Senha:</label>
                <input type="password" id="password" name="password" required>
            </div>

            <div class="input-container">
                <label for="password">Confirme sua senha:</label>
                <input type="password" id="confirmpassword" name="password" required>
            </div>

            <div class="input-container">
                <label for="terms">
                    <input type="checkbox" id="terms" name="terms" required>
                    Aceito os <a href="../termos.html">termos de uso</a>
                </label>
            </div>
            <div class="input-container">
                <label for="privacy">
                    <input type="checkbox" id="privacy" name="privacy" required>
                    Aceito a <a href="../politica.html">política de privacidade</a>
                </label>
                <br>
                  <div id="googleBtn"></div>
                   <br>
            <button type="submit">Cadastre-se</button>
            <br>
            <p>Já tem uma conta? <a href="../login/login.html">Faça login</a></p>


        </form>
    </div>
    <script src="cadastro.js"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</body>

</html>
